<!DOCTYPE html>
<html>
<head>
    <title>Заказ оформлен</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2ecc71;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>✅ Заказ успешно оформлен!</h1>
    <p>Чек отправлен на вашу почту 📧</p>

    <a href="{% url 'shop:catalog' %}">
        Вернуться в магазин
    </a>
</div>

</body>
</html>
