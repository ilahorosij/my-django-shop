{% extends 'base.html' %}

{% block title %}Оформление заказа{% endblock %}

{% block content %}
<div class="card p-4 shadow-sm border-0 rounded-4">
    <h2 class="mb-4">Оформление заказа</h2>

    <form method="post" class="mb-4">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Адрес доставки</label>
            <input type="text" name="address" class="form-control" placeholder="Введите адрес..." required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Подтвердить заказ</button>
    </form>

    <h4 class="mb-3">Ваш заказ:</h4>
    <div class="list-group list-group-flush">
        {% for item in items %}
            <div class="list-group-item d-flex justify-content-between align-items-center">
                <span>{{ item.product.name }}</span>
                <span>{{ item.quantity }} шт — {{ item.product.price }} ₽</span>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
